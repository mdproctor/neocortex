# casehub-neocortex-rag — corpus and embedding configuration
#
# Qdrant connection
# casehub.rag.qdrant.host=localhost
# casehub.rag.qdrant.port=6334
# casehub.rag.qdrant.use-tls=false
#
# Corpus definitions — each corpus gets a Qdrant collection with named vector spaces (dense + sparse)
# casehub.rag.corpora.policy.collection=policy-docs
# casehub.rag.corpora.policy.hybrid=true
#
# Dense embedding model (LangChain4j OnnxEmbeddingModel)
# casehub.rag.embedding.onnx.model-path=/models/bge-small-en.onnx
# casehub.rag.embedding.onnx.tokenizer-path=/models/tokenizer.json
# casehub.rag.embedding.onnx.dimensions=384
#
# Sparse embedding (inference-splade SparseEmbedder via inference-quarkus @InferenceModel)
# casehub.rag.embedding.splade.model-name=splade
#
# Retrieval tuning
# casehub.rag.retrieval.max-results=10
# casehub.rag.retrieval.rrf-k=60
# casehub.rag.retrieval.rerank-top-n=3
# casehub.rag.retrieval.rerank-enabled=false
#
# Chunking
# casehub.rag.chunking.max-tokens=300
# casehub.rag.chunking.overlap-tokens=30

%dev.casehub.rag.qdrant.host=localhost
%dev.casehub.rag.qdrant.port=6334
%dev.casehub.rag.qdrant.use-tls=false

%test.casehub.rag.qdrant.host=localhost
%test.casehub.rag.qdrant.port=6334
%test.casehub.rag.qdrant.use-tls=false
